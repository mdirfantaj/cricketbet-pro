<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <link rel="stylesheet" href="../styles.css">
</head>

<body>

<div class="container">

    <div class="card" style="max-width:400px;margin:auto;margin-top:100px;">

        <h2 style="text-align:center;">Admin Login</h2>

        <input id="email" class="form-input" placeholder="Email">
        <input id="password" type="password" class="form-input" placeholder="Password">

        <button class="btn btn-primary w-full" onclick="login()">
            Login
        </button>

    </div>

</div>

<script>
async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const res = await fetch("http://localhost:5000/api/login", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (data.user.role !== "admin") {
        alert("Not Admin");
        return;
    }

    localStorage.setItem("user", JSON.stringify(data.user));
    localStorage.setItem("token", data.accessToken || data.token);
    localStorage.setItem("refreshToken", data.refreshToken || "");

    window.location.href = "/admin/index.html";
}
</script>

</body>
</html>
